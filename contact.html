    <section class="contact-section py-5">
  <div class="container">
    <h2 class="text-center mb-4" data-aos="fade-up">Contact Us</h2>
    <form action="mailto:markscommercialservicesllc@gmail.com" method="post" enctype="text/plain" class="mx-auto p-4 bg-white shadow-sm rounded" style="max-width: 600px;" data-aos="fade-up" data-aos-delay="100">
      <div class="mb-3">
        <label for="name" class="form-label fw-semibold">Full Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>

      <div class="mb-3">
        <label for="message" class="form-label fw-semibold">Message</label>
        <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2">Send Message</button>
    </form>
  </div>
</section>
